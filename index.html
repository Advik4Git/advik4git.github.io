<!DOCTYPE html>
<html>
<head>
    <title>Zerodha Share Market Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #387ed1;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .stock-box {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .stock-name {
            font-size: 18px;
            font-weight: bold;
        }

        .price {
            font-size: 16px;
            margin-top: 5px;
        }

        .up {
            color: green;
        }

        .down {
            color: red;
        }

        button {
            padding: 8px 12px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .buy {
            background-color: green;
            color: white;
        }

        .sell {
            background-color: red;
            color: white;
        }

        footer {
            text-align: center;
            padding: 10px;
            background-color: #eee;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>Zerodha Share Market (Demo)</h1>
</header>

<div class="container">

    <div class="stock-box">
        <div class="stock-name">TCS</div>
        <div class="price up">₹ 3850 ▲ +25</div>
        <button class="buy">Buy</button>
        <button class="sell">Sell</button>
    </div>

    <div class="stock-box">
        <div class="stock-name">INFOSYS</div>
        <div class="price down">₹ 1520 ▼ -10</div>
        <button class="buy">Buy</button>
        <button class="sell">Sell</button>
    </div>

    <div class="stock-box">
        <div class="stock-name">RELIANCE</div>
        <div class="price up">₹ 2950 ▲ +15</div>
        <button class="buy">Buy</button>
        <button class="sell">Sell</button>
    </div>

</div>

<footer>
    © 2026 Zerodha Share Market Demo
</footer>

</body>
</html>
